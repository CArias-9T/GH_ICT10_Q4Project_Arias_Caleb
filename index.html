<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav">
    <nav class="navbar navbar-expand-sm navbar-dark" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="oblogo.png" alt="oblogo" id="logo" style="height:40px; width:40px;">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-between" id="mynavbar">

                <ul class="nav-pills nav">
                    <li class="nav-item"><a class="nav-link navlink" href="index.html">List of Students</a></li>
                    <li class="nav-item"><a class="nav-link navlink" href="attendance.html">Attendance Checker</a></li>
                    <li class="nav-item"><a class="nav-link navlink" href="activityphotos.html">Gallery</a></li>
                </ul>

                <form class="d-flex nav-form">
                    <input class="form-control me-2" type="text" placeholder="Search...">
                    <button class="btn btn-outline-light" type="button">Search</button>
                </form>

            </div>
        </div>
    </nav>
</div>

<div class="container-fluid body-container">
    <div class="row">

        <div class="col-sm-12">
            <div class="header">
                <h1>OB Montessori Student List</h1>
                <hr>

                <details>
                    <summary><p class="infotext">Details</p></summary>
                    <hr>
                    <p>You can find the students of OB Montessori here. Add students using the input fields below.</p>
                </details>
            </div>
        </div>

        <div class="col-sm-6">
            <div class="card">
                <h3>Student Info</h3>

                <input type="text" id="input1" placeholder="Enter classmate's name">
                <input type="text" id="input2" placeholder="Enter classmate's section">
                <input type="text" id="input3" placeholder="Enter favorite subject">

                <input type="button" value="Show Classmates" py-click="show_classmates">
            </div>
        </div>

        <div class="col-sm-6">
            <div class="card">
                <h3>List of Classmates</h3>
                <div id="listoutput"></div>
            </div>
        </div>

    </div>
</div>

<div class="container-fluid footer">
    <p id="footer">Caleb Arias & Miguel Sanchez | 10-Topaz</p>
</div>

<script type="py" src="main.py"></script>

</body>
</html>
