<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance Checker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav">
    <nav class="navbar navbar-expand-sm navbar-dark" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="oblogo.png" alt="oblogo" style="height:40px;width:40px;">
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-between" id="mynavbar">

                <ul class="nav-pills nav">
                    <li class="nav-item"><a class="nav-link navlink" href="index.html">List of Students</a></li>
                    <li class="nav-item"><a class="nav-link navlink" href="attendance.html">Attendance Checker</a></li>
                    <li class="nav-item"><a class="nav-link navlink" href="activityphotos.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link navlink" href="playerlist.html">List of Players</a></li>
                </ul>

                <form class="d-flex nav-form">
                    <input class="form-control me-2" type="text" placeholder="Search...">
                    <button class="btn btn-outline-light" type="button">Search</button>
                </form>

            </div>
        </div>
    </nav>
</div>

<div class="container-fluid body-container">
    <div class="row">

        <div class="col-sm-4"></div>

        <div class="col-sm-4">

            <div class="header">
                <h1>Topaz Absences Per Month</h1>
                <hr>

                <details>
                    <summary>Details</summary>
                    <p>Input monthly absences to generate a graph.</p>
                </details>
            </div>

            <div class="card">
                <h4>Enter Absences</h4>

                <input type="text" id="absence" placeholder="Enter absences">

                <h4>Enter Month</h4>
                <select id="monthselect">
                    <option>January</option>
                    <option>February</option>
                    <option>March</option>
                    <option>April</option>
                    <option>May</option>
                    <option>August</option>
                    <option>September</option>
                    <option>October</option>
                    <option>November</option>
                    <option>December</option>
                </select>

                <input type="button" value="Add Absences" py-click="graph">

                <div id="output"></div>
            </div>

        </div>

        <div class="col-sm-4"></div>

    </div>
</div>

<div class="container-fluid footer">
    <p id="footer">Caleb Arias & Miguel Joaquin Sanchez| 10-Topaz</p>
</div>

<script type="py" src="main.py"></script>

</body>
</html>
